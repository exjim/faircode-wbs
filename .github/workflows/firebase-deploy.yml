name: 🚀 Firebase Hosting 자동 배포

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout 코드
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 npm install
        run: npm ci

      - name: 🔨 npm run build
        run: npm run build

      - name: 🚀 Firebase Hosting 배포
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: faircodewbs
