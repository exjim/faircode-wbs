<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faircode WBS — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase npm 빌드 번들 (npm install firebase + vite build) -->
<script type="module" src="/js/login.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: 'Noto Sans KR', -apple-system, sans-serif;
  --acc: #2383e2;
  --acc2: #1a6fc4;
  --bg: #f7f7f5;
  --card: #ffffff;
  --border: #e9e9e7;
  --text: #1a1a1a;
  --t2: #6b7280;
  --t3: #9ca3af;
  --red: #ef4444;
  --green: #10b981;
}

body {
  font-family: var(--font);
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-wrap {
  width: 100%;
  max-width: 400px;
}

/* 로고 영역 */
.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.login-logo {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
}

.login-logo svg {
  width: 26px;
  height: 26px;
  fill: #fff;
}

.login-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.login-sub {
  font-size: 13px;
  color: var(--t2);
}

/* 카드 */
.login-card {
  background: var(--card);
  border-radius: 16px;
  padding: 36px 32px 32px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  border: 1px solid var(--border);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

/* 입력 필드 */
.field-group {
  margin-bottom: 16px;
}

.field-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--t2);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.field-input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-size: 14px;
  font-family: var(--font);
  color: var(--text);
  background: #fafafa;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  -webkit-appearance: none;
}

.field-input:focus {
  border-color: var(--acc);
  box-shadow: 0 0 0 3px rgba(35, 131, 226, 0.12);
  background: #fff;
}

.field-input::placeholder {
  color: var(--t3);
}

/* 비밀번호 눈 아이콘 */
.pw-wrap {
  position: relative;
}

.pw-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--t3);
  font-size: 16px;
  padding: 4px;
  display: flex;
  align-items: center;
  transition: color 0.15s;
}

.pw-toggle:hover { color: var(--t2); }

/* 로그인 버튼 */
.login-btn {
  width: 100%;
  padding: 12px;
  border-radius: 9px;
  border: none;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 8px;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 14px rgba(35,131,226,0.3);
}

.login-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(35,131,226,0.4);
}

.login-btn:active:not(:disabled) {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(35,131,226,0.3);
}

.login-btn:disabled {
  opacity: 0.65;
  cursor: not-allowed;
  transform: none;
}

/* 메시지 박스 */
.msg-box {
  margin-top: 14px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
  line-height: 1.5;
}

.msg-box.error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #dc2626;
}

.msg-box.success {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  color: #16a34a;
}

/* 구분선 */
.divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

/* 하단 정보 */
.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--t3);
  line-height: 1.8;
}

.login-footer a {
  color: var(--acc);
  text-decoration: none;
}

.login-footer a:hover {
  text-decoration: underline;
}

/* 잠금 아이콘 배지 */
.private-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  background: rgba(35,131,226,0.08);
  border-radius: 99px;
  font-size: 11px;
  color: var(--acc);
  font-weight: 600;
  margin-bottom: 16px;
}

/* 반응형 */
@media (max-width: 440px) {
  .login-card {
    padding: 28px 22px 24px;
  }
}

/* 로딩 오버레이 */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.3s;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- 초기 로딩 스피너 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="login-wrap">
  <!-- 헤더 -->
  <div class="login-header">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
      </svg>
    </div>
    <div class="private-badge">🔒 비공개 액세스</div>
    <h1 class="login-title">Faircode WBS</h1>
    <p class="login-sub">권한이 있는 계정으로만 접근 가능합니다</p>
  </div>

  <!-- 로그인 카드 -->
  <div class="login-card" id="loginBox">
    <div class="field-group">
      <label class="field-label" for="emailInput">이메일</label>
      <input
        class="field-input"
        type="email"
        id="emailInput"
        placeholder="your@email.com"
        autocomplete="email"
        onkeydown="handleKeydown(event)"
        autofocus
      >
    </div>

    <div class="field-group">
      <label class="field-label" for="pwInput">비밀번호</label>
      <div class="pw-wrap">
        <input
          class="field-input"
          type="password"
          id="pwInput"
          placeholder="비밀번호 입력"
          autocomplete="current-password"
          onkeydown="handleKeydown(event)"
          style="padding-right:42px"
        >
        <button class="pw-toggle" onclick="togglePw()" title="비밀번호 표시/숨기기">
          <span id="eyeIcon">👁</span>
        </button>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      로그인
    </button>

    <div class="msg-box" id="errorMsg"></div>
  </div>

  <!-- 하단 -->
  <div class="login-footer">
    <div>Powered by <strong>Firebase</strong> (Spark Free Plan)</div>
    <div>🔐 모든 데이터는 암호화되어 저장됩니다</div>
  </div>
</div>

<script>
// 비밀번호 보기/숨기기
function togglePw() {
  const inp = document.getElementById('pwInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.textContent = '🙈';
  } else {
    inp.type = 'password';
    icon.textContent = '👁';
  }
}

// Firebase 초기화 후 로딩 오버레이 제거
window.addEventListener('load', () => {
  setTimeout(() => {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.style.opacity = '0';
    setTimeout(() => { if (overlay) overlay.remove(); }, 300);
  }, 800);
});
</script>

</body>
</html>
